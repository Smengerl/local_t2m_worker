<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Generation Queue</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      padding: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1 {
      display: none;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .stat.pending .num {
      color: var(--yellow);
    }

    .stat.running .num {
      color: var(--blue);
    }

    .stat.done .num {
      color: var(--green);
    }

    .stat.failed .num {
      color: var(--red);
    }

    /* Layout: stats+form left, queue right */
    .layout {
      display: grid;
      grid-template-columns: var(--left-w, 400px) 4px 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
      column-gap: 0;
    }

    .layout>* {
      min-width: 0;
    }

    /* Left column: stats on top, form fills the rest */
    .left-col {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      transition: min-width .2s, max-width .2s;
    }

    .left-col.collapsed {
      min-width: 0 !important;
      max-width: 0 !important;
      overflow: hidden;
      padding: 0;
      pointer-events: none;
      opacity: 0;
    }

    .left-col .card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Resize handle between columns */
    .col-resizer {
      width: 4px;
      cursor: col-resize;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      transition: background .15s;
      z-index: 10;
      align-self: stretch;
      margin: 0 4px;
    }

    .col-resizer:hover,
    .col-resizer.dragging {
      background: var(--accent);
    }

    /* Collapse/expand toggle button on the resizer */
    .col-toggle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
      color: var(--muted);
      user-select: none;
      transition: background .15s, color .15s;
      z-index: 11;
    }

    .col-toggle:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Right column: queue fills full height */
    .right-col {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding-left: 8px;
    }

    .right-col .card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #job-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    @media(max-width: 600px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .col-resizer {
        display: none;
      }
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    /* Form */
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      margin-bottom: 12px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 64px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid var(--accent);
    }

    return ` <div class="job${expanded ? ' expanded' : ''}" id="job-${j.id}" onclick="toggleExpand('${j.id}')">$ {
      inlineThumb
    }

    <div class="job-content">opacity: 1;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      padding: 10px;
    }

    .btn-primary:hover {
      z-index: 12;
      filter: brightness(1.15);
    }

    /* Shared ghost style for all action buttons */
    .btn-sm {
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: border-color .15s, color .15s, background .15s;
    }

    .btn-sm .material-icons-round {
      font-size: 14px;
      line-height: 1;
    }

    .btn-danger {
      color: var(--text);
      border-color: var(--border);
    }

    .btn-danger:hover {
      background: color-mix(in srgb, var(--text) 8%, transparent);
      border-color: var(--muted);
    }

    .btn-retry {
      color: var(--text);
      border-color: var(--border);
    }

    .btn-retry:hover {
      background: color-mix(in srgb, var(--text) 8%, transparent);
      border-color: var(--muted);
    }

    .btn-cancel {
      color: var(--text);
      border-color: var(--border);
    }

    .btn-cancel:hover {
      background: color-mix(in srgb, var(--text) 8%, transparent);
      border-color: var(--muted);
    }

    .btn-clear {
      color: var(--text);
      border-color: var(--border);
      background: transparent;
      font-size: 12px;
      margin-bottom: 0;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: border-color .15s, color .15s, background .15s;
    }

    .btn-clear .material-icons-round {
      font-size: 15px;
      line-height: 1;
    }

    .btn-clear:hover {
      background: color-mix(in srgb, var(--text) 8%, transparent);
      border-color: var(--muted);
    }

    /* Queue table */
    .queue-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .queue-header h2 {
      margin-right: auto;
      margin-bottom: 0;
      line-height: 1;
    }

    /* Inline stats in queue header */
    .stats {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .stat {
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .stat .num {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .stat .lbl {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    .job {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s;
      overflow: hidden;
      min-width: 0;
      min-height: 100px;
      position: relative;
    }

    .job:hover {
      border-color: var(--accent);
    }

    .job-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .badge.pending {
      background: #3a2e00;
      color: var(--yellow);
    }

    .badge.running {
      background: #0d1f3c;
      color: var(--blue);
    }

    .badge.done {
      background: #052015;
      color: var(--green);
    }

    .badge.failed {
      background: #2a0808;
      color: var(--red);
    }

    .job-prompt {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .job-cfg {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    .job-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .job-inner {
      display: block;
    }

    .job-cfg {
      display: none;
    }

    .job-actions {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }

    /* Progress bar — only visible while running */
    .job-progress {
      margin-top: 10px;
      display: none;
    }

    .job-progress.visible {
      display: block;
    }

    .job-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .job-progress progress {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      accent-color: var(--accent);
    }

    /* Config section group headers inside Advanced overrides */
    .cfg-section {
      margin-bottom: 4px;
    }

    .cfg-section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 10px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    details.cfg-section>summary.cfg-section-header {
      text-transform: none;
      letter-spacing: normal;
      font-size: 12px;
    }

    .cfg-section-header:first-child {
      margin-top: 0;
    }

    details.cfg-section[open] .cfg-toggle-arrow {
      transform: rotate(90deg);
    }

    /* Notes boxes rendered below the config selector */
    .notes-about {
      background: transparent;
      border-left: 3px solid var(--muted);
      padding: 6px 10px;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .notes-warning {
      background: color-mix(in srgb, var(--yellow) 10%, transparent);
      border-left: 3px solid var(--yellow);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--yellow);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .notes-guide {
      font-size: 11px;
      margin-bottom: 10px;
    }

    .notes-guide summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      text-transform: none;
      letter-spacing: normal;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .notes-guide summary::before {
      content: '▶';
      font-size: 9px;
      transition: transform .15s;
    }

    .notes-guide[open] summary::before {
      transform: rotate(90deg);
    }

    .notes-guide-body {
      margin-top: 6px;
      padding: 6px 10px;
      background: transparent;
      border-left: 3px solid var(--muted);
      color: var(--muted);
      font-size: 11px;
      font-style: italic;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .config-hints-general {
      color: var(--muted);
      margin-bottom: 5px;
      font-style: italic;
    }

    .config-hints-table {
      width: 100%;
      border-collapse: collapse;
    }

    .config-hints-table td {
      padding: 1px 0;
      vertical-align: top;
    }

    .config-hints-key {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      font-size: 10px;
      white-space: nowrap;
      padding-right: 10px;
      width: 1%;
      padding-top: 2px;
    }

    .config-hints-val {
      color: #8fa0b8;
      word-break: break-word;
    }

    .field-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      margin-bottom: 10px;
      line-height: 1.4;
      font-style: italic;
    }

    /* Tooltip icon next to label */
    .hint-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      color: var(--bg);
      font-size: 9px;
      font-weight: 700;
      font-style: normal;
      line-height: 1;
      cursor: default;
      position: relative;
      vertical-align: middle;
      margin-left: 5px;
      flex-shrink: 0;
    }

    .hint-icon .hint-tooltip {
      display: none;
      position: absolute;
      left: calc(100% + 8px);
      top: calc(100% + 4px);
      transform: none;
      background: #2c3040;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 400;
      color: #c8d8f0;
      white-space: pre-wrap;
      word-break: break-word;
      width: max-content;
      max-width: 240px;
      z-index: 100;
      line-height: 1.5;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .5);
    }

    .hint-icon .hint-tooltip::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 100%;
      transform: none;
      border: 5px solid transparent;
      border-right-color: #2c3040;
    }

    .hint-icon:hover .hint-tooltip {
      display: block;
    }

    .label-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .label-row label {
      margin-bottom: 0;
    }

    /* Detail panel */
    .detail {
      margin-top: 10px;
    }

    .detail-negative {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .detail-prompt-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .copy-inline-btn {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 6px 18px rgba(124, 106, 247, 0.14);
      transition: transform .08s ease, filter .08s ease, box-shadow .12s ease;
    }

    .copy-inline-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow: 0 10px 26px rgba(124, 106, 247, 0.18);
    }

    .copy-inline-btn:active {
      transform: translateY(0);
      filter: brightness(0.98);
      box-shadow: 0 4px 12px rgba(124, 106, 247, 0.12);
    }

    .detail pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .detail-prompt {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 10px;
      color: var(--text);
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .detail-table td {
      padding: 3px 6px 3px 0;
      vertical-align: top;
    }

    .detail-key {
      color: var(--muted);
      white-space: nowrap;
      padding-right: 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      width: 1%;
    }

    .detail-table td:last-child {
      color: var(--text);
      word-break: break-word;
    }

    .detail img {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 10px;
      border: 1px solid var(--border);
    }

    /* Log panel */
    .job-log {
      margin-top: 12px;
    }

    .job-log-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .job-log-body {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.55;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #c8d0da;
    }

    .job-thumb {
      position: absolute;
      top: -1px;
      right: -1px;
      width: 100px;
      height: 100px;
      object-fit: contain;
      object-position: right center;
      border-radius: 0 8px 8px 0;
      cursor: zoom-in;
      z-index: 12;
    }

    .job-content {
      flex: 1;
      min-width: 0;
    }

    /* Reserve space for the thumbnail in collapsed rows */
    .job:not(.expanded) .job-content {
      padding-right: 108px;
    }

    /* In expanded rows allow the content to use the full width; the
       thumbnail remains top-right and overlays the content if necessary. */
    .job.expanded .job-content {
      padding-right: 0;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .8);
      cursor: default;
    }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px;
    }

    /* Spinner */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <h1>🖼 Image Generation Queue</h1>

  <div class="layout">

    <!-- ── Left column: form only ── -->
    <div class="left-col">

      <!-- Enqueue form -->
      <div class="card">
        <h2 style="display:none">New Job</h2>
        <form id="enqueue-form">
          <div class="label-row"><label>Prompt *</label><span id="f-prompt-icon" class="hint-icon"
              style="display:none">?<span class="hint-tooltip" id="f-prompt-tooltip"></span></span></div>
          <textarea id="f-prompt" required placeholder="a sunset over mountains"></textarea>

          <div class="label-row"><label>Negative Prompt</label><span id="f-negative-icon" class="hint-icon"
              style="display:none">?<span class="hint-tooltip" id="f-negative-tooltip"></span></span></div>
          <input id="f-negative" type="text" placeholder="blurry, low quality">

          <div class="label-row"><label>Config</label></div>
          <select id="f-config">
            <option value="">Loading configs…</option>
          </select>
          <!-- Notes boxes: about (grey), warnings (yellow), prompt guide (collapsible) -->
          <div id="f-notes-about" class="notes-about" style="display:none"></div>
          <div id="f-notes-warning" class="notes-warning" style="display:none"></div>
          <details id="f-notes-guide" class="notes-guide" style="display:none">
            <summary>Prompt guide</summary>
            <div id="f-notes-guide-body" class="notes-guide-body"></div>
          </details>

          <details class="cfg-section" style="margin-bottom:8px">
            <summary class="cfg-section-header"
              style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px">
              <span style="font-size:9px;transition:transform .15s" class="cfg-toggle-arrow">▶</span>
              <span>Model</span>
              <span id="f-model-section-icon" class="hint-icon" style="display:none">?<span class="hint-tooltip"
                  id="f-model-section-tooltip"></span></span>
            </summary>
            <div style="margin-top:8px">
              <div class="label-row"><label>Model repo override</label></div>
              <input id="f-model-repo" type="text">
              <label>GGUF file override</label>
              <input id="f-model-gguf-file" type="text" placeholder="(not set)">
            </div>
          </details>

          <details class="cfg-section" style="margin-bottom:8px">
            <summary class="cfg-section-header"
              style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px">
              <span style="font-size:9px;transition:transform .15s" class="cfg-toggle-arrow">▶</span>
              <span>LoRA</span>
              <span id="f-lora-section-icon" class="hint-icon" style="display:none">?<span class="hint-tooltip"
                  id="f-lora-section-tooltip"></span></span>
            </summary>
            <div style="margin-top:8px">
              <div class="row" style="align-items:flex-start">
                <div style="flex:3">
                  <label>LoRA repo override</label>
                  <input id="f-lora-repo" type="text">
                </div>
                <div style="flex:1">
                  <label>Strength</label>
                  <input id="f-lora-strength" type="number" step="0.05" min="0" max="1">
                </div>
              </div>
            </div>
          </details>

          <details class="cfg-section" style="margin-bottom:12px">
            <summary class="cfg-section-header"
              style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px">
              <span style="font-size:9px;transition:transform .15s" class="cfg-toggle-arrow">▶</span>
              <span>Generation</span>
              <span id="f-gen-section-icon" class="hint-icon" style="display:none">?<span class="hint-tooltip"
                  id="f-gen-section-tooltip"></span></span>
            </summary>
            <div style="margin-top:8px">
              <div class="row" style="align-items:flex-start">
                <div>
                  <label>Steps</label>
                  <input id="f-steps" type="number" min="1">
                </div>
                <div>
                  <label>Guidance scale (cfg_scale)</label>
                  <input id="f-cfg-scale" type="number" step="0.5">
                </div>
              </div>
              <div class="label-row"><label>Size</label></div>
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">
                <input id="f-width" type="number" min="64" step="8" placeholder="Width" style="margin-bottom:0;flex:1">
                <span style="color:var(--muted);font-size:13px;white-space:nowrap;flex-shrink:0">×</span>
                <input id="f-height" type="number" min="64" step="8" placeholder="Height"
                  style="margin-bottom:0;flex:1">
              </div>
            </div>
          </details>

          <input id="f-output" type="hidden" value="">

          <button type="submit" class="btn-primary">➕ Add to Queue</button>
          <div id="form-msg" style="margin-top:8px;font-size:12px;min-height:18px"></div>
        </form>
      </div><!-- /.card (form) -->

    </div><!-- /.left-col -->

    <!-- ── Resize handle ── -->
    <div class="col-resizer" id="col-resizer">
      <div class="col-toggle" id="col-toggle" title="Collapse / expand sidebar">◀</div>
    </div>

    <!-- ── Right column: Queue list ── -->
    <div class="right-col">
      <div class="card">
        <div class="queue-header">
          <h2>Queue</h2>
          <div class="stats" id="stats">
            <div class="stat pending"><span class="num" id="s-pending">–</span><span class="lbl">Pending</span></div>
            <div class="stat running"><span class="num" id="s-running">–</span><span class="lbl">Running</span></div>
            <div class="stat done"><span class="num" id="s-done">–</span><span class="lbl">Done</span></div>
            <div class="stat failed"><span class="num" id="s-failed">–</span><span class="lbl">Failed</span></div>
          </div>
          <button class="btn-clear" onclick="clearFinished()"><span class="material-icons-round">delete_sweep</span>
            Clear finished</button>
        </div>
        <div id="job-list">
          <div class="empty">Loading…</div>
        </div>
      </div>
    </div><!-- /.right-col -->

  </div><!-- /.layout -->

  <script>
    const $ = id => document.getElementById(id);

    // ── Sidebar resize & collapse ──────────────────────────────────────────────
    (function () {
      const STORAGE_KEY_W = 'sidebar_width';
      const STORAGE_KEY_C = 'sidebar_collapsed';
      const MIN_W = 120;
      const MAX_W = 700;

      const layout = document.querySelector('.layout');
      const leftCol = document.querySelector('.left-col');
      const resizer = document.getElementById('col-resizer');
      const toggle = document.getElementById('col-toggle');

      let collapsed = localStorage.getItem(STORAGE_KEY_C) === '1';
      let width = parseInt(localStorage.getItem(STORAGE_KEY_W) || '400', 10);

      function applyState() {
        if (collapsed) {
          layout.style.gridTemplateColumns = `0 4px 1fr`;
          leftCol.classList.add('collapsed');
          toggle.textContent = '▶';
          toggle.title = 'Expand sidebar';
        } else {
          layout.style.gridTemplateColumns = `${width}px 4px 1fr`;
          leftCol.classList.remove('collapsed');
          toggle.textContent = '◀';
          toggle.title = 'Collapse sidebar';
        }
      }

      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        collapsed = !collapsed;
        localStorage.setItem(STORAGE_KEY_C, collapsed ? '1' : '0');
        applyState();
      });

      // Drag-to-resize
      let dragging = false;
      let startX = 0;
      let startW = 0;

      resizer.addEventListener('mousedown', function (e) {
        if (e.target === toggle) return; // handled by toggle
        if (collapsed) return;
        dragging = true;
        startX = e.clientX;
        startW = width;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        const delta = e.clientX - startX;
        width = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
        layout.style.gridTemplateColumns = `${width}px 4px 1fr`;
      });

      document.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        localStorage.setItem(STORAGE_KEY_W, width);
      });

      applyState();
    })();

    // ── Helpers ────────────────────────────────────────────────────────────────
    async function apiFetch(path, opts = {}) {
      const r = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    }

    function badge(status) {
      return `<span class="badge ${status}">${status}</span>`;
    }

    function relTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const diff = Math.round((Date.now() - d) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      return d.toLocaleTimeString();
    }

    function durStr(startIso, endIso) {
      if (!startIso || !endIso) return null;
      const secs = Math.round((new Date(endIso) - new Date(startIso)) / 1000);
      if (secs < 60) return `${secs}s`;
      return `${Math.floor(secs / 60)}m ${secs % 60}s`;
    }

    // ── Stats ──────────────────────────────────────────────────────────────────
    async function refreshStats() {
      try {
        const s = await apiFetch('/api/stats');
        $('s-pending').textContent = s.pending;
        $('s-running').textContent = s.running;
        $('s-done').textContent = s.done;
        $('s-failed').textContent = s.failed;
      } catch (e) { /* ignore stats errors silently */ }
    }

    // ── Job list ───────────────────────────────────────────────────────────────
    let expandedId = null;

    async function refreshJobs() {
      let jobs;
      try {
        jobs = await apiFetch('/api/jobs');
      } catch (e) {
        $('job-list').innerHTML = `<div class="empty" style="color:var(--red)">⚠ Server nicht erreichbar: ${escHtml(String(e.message))}</div>`;
        return;
      }
      const list = $('job-list');

      if (jobs.length === 0) {
        list.innerHTML = '<div class="empty">Queue is empty.</div>';
        return;
      }

      // Render newest-first (reverse), but keep the FIFO logic in the backend
      const ordered = [...jobs].reverse();

      list.innerHTML = ordered.map(j => {
        const pc = j.pipeline_config || {};
        const cfg = pc.pipeline_type ?? '—';
        const expanded = j.id === expandedId;
        const actions = [];

        if (j.status === 'pending') {
          actions.push(`<button class="btn-sm btn-danger" onclick="deleteJob('${j.id}',event)"><span class="material-icons-round">delete</span>Delete</button>`);
        }
        if (j.status === 'failed' || j.status === 'done') {
          actions.push(`<button class="btn-sm btn-retry" onclick="retryJob('${j.id}',event)"><span class="material-icons-round">replay</span>Re-run</button>`);
        }
        if (j.status === 'failed' || (j.status === 'done' && !j.result_path)) {
          actions.push(`<button class="btn-sm btn-danger" onclick="deleteJob('${j.id}',event)"><span class="material-icons-round">delete</span>Delete</button>`);
        }
        if (j.status === 'done' && j.result_path) {
          const fname = j.result_path.split('/').pop();
          actions.push(`<button class="btn-sm btn-danger" onclick="deleteImage('${fname}','${j.id}',event)"><span class="material-icons-round">hide_image</span>Delete image</button>`);
        }
        if (j.status === 'running') {
          // Cancel + spinner are rendered inside the progress block
        }
        // Copy button moved into expanded detail to avoid toggling the entry when clicked

        // ── progress bar ──────────────────────────────────────────────────────
        const step = j.progress_step || 0;
        const total = j.progress_total || 0;

        // Three states while running:
        //   1. total unknown (0)  → "Preparing to generate",  0 %
        //   2. steps in progress  → "X / N steps (Y %)",      Y %
        //   3. all steps done     → "Completing process",      100 %
        const allStepsDone = total > 0 && step >= total;
        const stepsKnown = total > 0 && !allStepsDone;

        let displayStep, pct, progressLabel, progressRight;
        if (allStepsDone) {
          displayStep = total;
          pct = 100;
          progressLabel = 'Completing process';
          progressRight = `${total} / ${total} steps&nbsp;(100%)`;
        } else if (stepsKnown) {
          // step from backend = number of completed steps (pipeline sends step_index + 1)
          displayStep = step;
          pct = Math.round((displayStep / total) * 100);
          progressLabel = `Generating…`;
          progressRight = `${displayStep} / ${total} steps&nbsp;(${pct}%)`;
        } else {
          // total unknown yet — preparing phase
          displayStep = 0;
          pct = 0;
          progressLabel = 'Preparing to generate';
          progressRight = '';
        }

        const showProgress = j.status === 'running';
        const progressBlock = `
      <div class="job-progress${showProgress ? ' visible' : ''}">
        <div class="job-progress-labels">
          <span style="display:flex;align-items:center;gap:8px">
            <button class="btn-sm btn-cancel" onclick="cancelJob('${j.id}',event)"><span class="material-icons-round">cancel</span>Cancel</button>
            <span class="spinner"></span>
            <span>${escHtml(progressLabel)}</span>
          </span>
          <span>${progressRight}</span>
        </div>
        <progress value="${pct}" max="100"></progress>
      </div>`;

        let detail = '';
        if (expanded) {
          const dur = durStr(j.started_at, j.finished_at);
          const rows = [
            ['Config', escHtml(pc.pipeline_type ?? '—')],
            ['Model', escHtml(pc.model_id ?? '—')],
            pc.lora_id ? ['LoRA', escHtml(pc.lora_id)] : null,
            pc.lora_scale != null ? ['LoRA scale', pc.lora_scale] : null,
            ['Steps', pc.num_inference_steps ?? '—'],
            ['Guidance', pc.guidance_scale ?? '—'],
            ['Added', j.added_at ? new Date(j.added_at).toLocaleString() : '—'],
            j.started_at ? ['Started', new Date(j.started_at).toLocaleString()] : null,
            j.finished_at ? ['Finished', new Date(j.finished_at).toLocaleString()] : null,
            dur ? ['Duration', dur] : null,
          ].filter(Boolean);

          const tableRows = rows.map(([k, v]) =>
            `<tr><td class="detail-key">${k}</td><td>${v}</td></tr>`).join('');

          const errorBlock = j.error
            ? `<pre style="color:var(--red);margin-top:10px">${escHtml(j.error)}</pre>`
            : '';

          const logLines = j.log_lines ?? [];
          const logBlock = logLines.length > 0 ? `
        <div class="job-log">
          <div class="job-log-header">Log</div>
          <div class="job-log-body" id="log-${j.id}">${escHtml(logLines.join('\n'))}</div>
        </div>` : '';

          detail = `
        <div class="detail">
          <div class="detail-prompt-row">
            <button class="copy-inline-btn" data-prompt="${encodeURIComponent(j.prompt ?? '')}" onclick="copyPromptFromEl(this,event)">Copy</button>
            <div class="detail-prompt">${escHtml(j.prompt)}</div>
          </div>
          ${j.negative_prompt ? `<div class="detail-prompt-row">
            <button class="copy-inline-btn" data-prompt="${encodeURIComponent(j.negative_prompt ?? '')}" onclick="copyPromptFromEl(this,event)">Copy</button>
            <div class="detail-negative">${escHtml(j.negative_prompt)}</div>
          </div>` : ''}
          <table class="detail-table">${tableRows}</table>
          ${logBlock}
          ${errorBlock}
        </div>`;
        }

        const thumbSrc = (j.status === 'done' && j.result_path)
          ? `/outputs/${j.result_path.split('/').pop()}`
          : null;
        const inlineThumb = thumbSrc
          ? `<img class="job-thumb" src="${thumbSrc}" alt="result"
              onclick="event.stopPropagation(); openLightbox('${thumbSrc}')">`
          : '';

        // Build enriched subtitle
        const modelShort = pc.model_id ? pc.model_id.split('/').pop() : null;
        const metaParts = [];
        metaParts.push(j.finished_at ? 'finished ' + relTime(j.finished_at) : 'added ' + relTime(j.added_at));
        if (j.status === 'done' && durStr(j.started_at, j.finished_at)) metaParts.push('⏱ ' + durStr(j.started_at, j.finished_at));
        if (cfg && cfg !== '—') metaParts.push(cfg);
        if (modelShort) metaParts.push(modelShort);
        if (pc.num_inference_steps != null) metaParts.push(pc.num_inference_steps + ' steps');
        if (pc.guidance_scale != null) metaParts.push('cfg ' + pc.guidance_scale);

        return `
  <div class="job${expanded ? ' expanded' : ''}" id="job-${j.id}" onclick="toggleExpand('${j.id}')">
        ${inlineThumb}
        <div class="job-content">
          <div class="job-top">
            ${badge(j.status)}
            <span class="job-prompt">${escHtml(j.prompt)}</span>
          </div>
          <div class="job-meta">${metaParts.join('  ·  ')}</div>
          <div class="job-actions">${actions.join('')}</div>
          ${progressBlock}
          ${detail}
        </div>
      </div>`;
      }).join('');

      // Auto-scroll all visible log panels to the bottom (live tail)
      document.querySelectorAll('.job-log-body').forEach(el => {
        el.scrollTop = el.scrollHeight;
      });
    }

    function escHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Copy a prompt string to clipboard. Uses async Clipboard API with a textarea
    // fallback for older browsers. Shows a small transient toast on success/failure.
    async function copyPrompt(text) {
      const raw = String(text ?? '');
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(raw);
        } else {
          // Fallback: hidden textarea
          const ta = document.createElement('textarea');
          ta.value = raw;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        showToast('Copied prompt to clipboard');
      } catch (e) {
        console.error('Copy failed', e);
        showToast('Copy failed');
      }
    }

    // Called from inline buttons; stops propagation then decodes data-prompt
    function copyPromptFromEl(btn, evt) {
      evt.stopPropagation();
      const enc = btn.getAttribute('data-prompt') || '';
      const text = decodeURIComponent(enc);
      copyPrompt(text);
    }

    // Small transient toast
    function showToast(msg, ms = 1800) {
      let t = document.getElementById('copied-toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'copied-toast';
        t.style.position = 'fixed';
        t.style.right = '18px';
        t.style.bottom = '18px';
        t.style.background = 'rgba(20,20,30,0.95)';
        t.style.color = 'white';
        t.style.padding = '8px 12px';
        t.style.borderRadius = '8px';
        t.style.boxShadow = '0 6px 18px rgba(0,0,0,0.6)';
        t.style.zIndex = 2000;
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._hideTimer);
      t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, ms);
    }

    function toggleExpand(id) {
      expandedId = expandedId === id ? null : id;
      refreshJobs();
    }

    // ── Actions ────────────────────────────────────────────────────────────────
    async function deleteJob(id, evt) {
      evt.stopPropagation();
      await apiFetch(`/api/jobs/${id}`, { method: 'DELETE' });
      if (expandedId === id) expandedId = null;
      refresh();
    }

    async function retryJob(id, evt) {
      evt.stopPropagation();
      await apiFetch(`/api/jobs/${id}/retry`, { method: 'POST' });
      refresh();
    }

    async function cancelJob(id, evt) {
      evt.stopPropagation();
      if (!confirm('Job wirklich abbrechen?')) return;
      await apiFetch(`/api/jobs/${id}/cancel`, { method: 'POST' });
      refresh();
    }

    async function deleteImage(filename, jobId, evt) {
      evt.stopPropagation();
      if (!confirm('Bild unwiderruflich löschen?')) return;
      await apiFetch(`/outputs/${filename}`, { method: 'DELETE' });
      // Also remove the job entry so the generated image no longer appears in the list
      try {
        await apiFetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
      } catch (e) {
        // If job deletion fails (e.g. job running), just continue and refresh the list
      }
      refresh();
    }

    async function clearFinished() {
      await apiFetch('/api/clear-finished', { method: 'POST' });
      expandedId = null;
      refresh();
    }

    // ── Config dropdown (dynamic) ──────────────────────────────────────────────
    async function loadConfigs() {
      try {
        const configs = await apiFetch('/api/configs');
        const sel = $('f-config');

        // Store full config metadata keyed by config value path
        const configMeta = {};
        sel.innerHTML = configs.map(c => {
          configMeta[c.value] = c;
          return `<option value="${escHtml(c.value)}">${escHtml(c.label)}</option>`;
        }).join('');

        // Helper: set a hint-icon tooltip or hide it
        function setSectionHint(iconId, tooltipId, text) {
          const icon = $(iconId);
          const tip = $(tooltipId);
          if (!icon || !tip) return;
          if (text) { tip.textContent = text; icon.style.display = ''; }
          else { icon.style.display = 'none'; }
        }

        function updateHints() {
          const meta = configMeta[sel.value];

          // ── Notes boxes ──
          const notesAbout = $('f-notes-about');
          const notesWarning = $('f-notes-warning');
          const notesGuide = $('f-notes-guide');
          const notesGuideBody = $('f-notes-guide-body');

          if (!meta) {
            // No config selected — hide everything, reset placeholders
            [notesAbout, notesWarning, notesGuide].forEach(el => el.style.display = 'none');
            ['f-model-section-icon', 'f-lora-section-icon', 'f-gen-section-icon',
              'f-prompt-icon', 'f-negative-icon'].forEach(id => {
                const el = $(id); if (el) el.style.display = 'none';
              });
            $('f-model-repo').placeholder = '(not set)';
            $('f-lora-repo').placeholder = '(not set)';
            $('f-lora-strength').placeholder = '(not set)';
            $('f-steps').placeholder = '(not set)';
            $('f-cfg-scale').placeholder = '(not set)';
            $('f-width').placeholder = 'Width';
            $('f-height').placeholder = 'Height';
            $('f-model-gguf-file').placeholder = '(not set)';
            return;
          }

          const hints = meta.hints || {};
          const defs = meta.defaults || {};
          const extras = meta.extras || {};
          const notes = meta.notes || {};

          // ── notes.about ──
          if (notes.about) {
            notesAbout.textContent = notes.about;
            notesAbout.style.display = '';
          } else {
            notesAbout.style.display = 'none';
          }

          // ── notes.warnings ──
          if (notes.warnings) {
            notesWarning.textContent = notes.warnings;
            notesWarning.style.display = '';
          } else {
            notesWarning.style.display = 'none';
          }

          // ── notes.prompt_guide ──
          if (notes.prompt_guide) {
            notesGuideBody.textContent = notes.prompt_guide;
            notesGuide.style.display = '';
          } else {
            notesGuide.style.display = 'none';
          }

          // ── Trigger word hint on prompt label ──
          const triggerWord = extras.trigger_word || null;
          const promptIcon = $('f-prompt-icon');
          const promptTooltip = $('f-prompt-tooltip');
          if (promptIcon && promptTooltip) {
            if (triggerWord) {
              promptTooltip.textContent = `Trigger word: ${triggerWord}`;
              promptIcon.style.display = '';
            } else {
              promptIcon.style.display = 'none';
            }
          }
          const negativeIcon = $('f-negative-icon');
          const negativeTooltip = $('f-negative-tooltip');
          if (negativeIcon && negativeTooltip) {
            negativeIcon.style.display = 'none'; // negative hint folded into prompt_guide
          }

          // ── Section hint icons ──
          setSectionHint('f-model-section-icon', 'f-model-section-tooltip', hints.model || '');
          setSectionHint('f-lora-section-icon', 'f-lora-section-tooltip', hints.lora || '');
          setSectionHint('f-gen-section-icon', 'f-gen-section-tooltip', hints.generation || '');

          // ── Input placeholders from config defaults ──
          $('f-model-repo').placeholder = defs.model_repo ?? '(not set)';
          $('f-lora-repo').placeholder = defs.lora_repo ?? '(not set)';
          $('f-lora-strength').placeholder = defs.lora_strength != null ? String(defs.lora_strength) : '(not set)';
          $('f-steps').placeholder = defs.steps != null ? String(defs.steps) : '(not set)';
          $('f-cfg-scale').placeholder = defs.cfg_scale != null ? String(defs.cfg_scale) : '(not set)';
          $('f-width').placeholder = defs.width != null ? String(defs.width) : 'Width';
          $('f-height').placeholder = defs.height != null ? String(defs.height) : 'Height';
          $('f-model-gguf-file').placeholder = defs.model_gguf_file ?? '(not set)';
        }

        sel.addEventListener('change', updateHints);
        updateHints();
      } catch (err) {
        console.warn('Could not load configs:', err);
      }
    }

    // ── Form submit ────────────────────────────────────────────────────────────
    $('enqueue-form').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = $('form-msg');
      msg.textContent = '';

      const body = {
        config: $('f-config').value,
        prompt: $('f-prompt').value.trim(),
        negative_prompt: $('f-negative').value.trim(),
        output: $('f-output').value.trim() || null,
        model_repo: $('f-model-repo').value.trim() || null,
        lora_repo: $('f-lora-repo').value.trim() || null,
        lora_strength: $('f-lora-strength').value ? +$('f-lora-strength').value : null,
        steps: $('f-steps').value ? +$('f-steps').value : null,
        cfg_scale: $('f-cfg-scale').value ? +$('f-cfg-scale').value : null,
        width: $('f-width').value ? +$('f-width').value : null,
        height: $('f-height').value ? +$('f-height').value : null,
        model_gguf_file: $('f-model-gguf-file').value.trim() || null,
      };

      try {
        const job = await apiFetch('/api/jobs', {
          method: 'POST',
          body: JSON.stringify(body),
        });
        msg.style.color = 'var(--green)';
        msg.textContent = `✅ Queued  id=${job.id.slice(0, 8)}…`;
        $('f-prompt').value = '';
        refresh();
      } catch (err) {
        msg.style.color = 'var(--red)';
        msg.textContent = `❌ ${err.message}`;
      }
    });

    // ── Lightbox ───────────────────────────────────────────────────────────────
    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      lb.classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── Polling ────────────────────────────────────────────────────────────────
    async function refresh() {
      await Promise.all([refreshStats(), refreshJobs()]);
    }

    async function init() {
      await loadConfigs();   // populate config dropdown first
      refresh();
      setInterval(refresh, 3000);   // auto-refresh every 3 s
    }

    init();
  </script>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="full size" onclick="event.stopPropagation()">
  </div>

</body>

</html>
