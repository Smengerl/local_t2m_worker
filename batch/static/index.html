<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Generation Queue</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="/static/queue-ui.js"></script>
  <script src="/static/scripts.js"></script>
</head>

<body>
  <div class="layout">

    <h1>Image Generation Queue Worker</h1>
    <!-- ── Left column: form only ── -->
    <div class="left-col">

      <!-- Enqueue form -->
      <div class="card">
        <form id="enqueue-form">
          <div class="label-row"><label>Prompt *</label><span id="f-prompt-icon" class="hint-icon hidden">?<span
                class="hint-tooltip" id="f-prompt-tooltip"></span></span></div>
          <textarea id="f-prompt" required placeholder="a sunset over mountains"></textarea>

          <div class="label-row"><label>Negative Prompt</label><span id="f-negative-icon"
              class="hint-icon hidden">?<span class="hint-tooltip" id="f-negative-tooltip"></span></span></div>
          <input id="f-negative" type="text" placeholder="blurry, low quality">

          <div class="label-row"><label>Config</label></div>
          <select id="f-config">
            <option value="">Loading configs…</option>
          </select>
          <!-- Notes boxes: about (grey), warnings (yellow), prompt guide (collapsible) -->
          <div id="f-notes-about" class="notes-about hidden"></div>
          <div id="f-notes-warning" class="notes-warning hidden"></div>
          <details id="f-notes-guide" class="notes-guide hidden">
            <summary>Prompt guide</summary>
            <div id="f-notes-guide-body" class="notes-guide-body"></div>
          </details>

          <details class="cfg-section">
            <summary class="cfg-section-header">
              <span class="cfg-toggle-arrow">▶</span>
              <span>Model</span>
              <span id="f-model-section-icon" class="hint-icon hidden">?<span class="hint-tooltip"
                  id="f-model-section-tooltip"></span></span>
            </summary>
            <div class="cfg-section-body">
              <label>Model repo override</label>
              <input id="f-model-repo" type="text">
              <label>GGUF file override</label>
              <input id="f-model-gguf-file" type="text" placeholder="(not set)">
            </div>
          </details>

          <details class="cfg-section">
            <summary class="cfg-section-header">
              <span class="cfg-toggle-arrow">▶</span>
              <span>LoRA</span>
              <span id="f-lora-section-icon" class="hint-icon hidden">?<span class="hint-tooltip"
                  id="f-lora-section-tooltip"></span></span>
            </summary>
            <div class="cfg-section-body">
              <div class="row">
                <div class="lora-repo-col">
                  <label>LoRA repo override</label>
                  <input id="f-lora-repo" type="text">
                </div>
                <div class="lora-strength-col">
                  <label>Strength</label>
                  <input id="f-lora-strength" type="number" step="0.05" min="0" max="1">
                </div>
              </div>
            </div>
          </details>

          <details class="cfg-section">
            <summary class="cfg-section-header">
              <span class="cfg-toggle-arrow">▶</span>
              <span>Generation</span>
              <span id="f-gen-section-icon" class="hint-icon hidden">?<span class="hint-tooltip"
                  id="f-gen-section-tooltip"></span></span>
            </summary>
            <div class="cfg-section-body">

              <label>Steps</label>
              <input id="f-steps" type="number" min="1">
              <label>Guidance scale (cfg_scale)</label>
              <input id="f-cfg-scale" type="number" step="0.5">


              <div class="label-row"><label>Size</label></div>
              <div class="size-input-row">
                <input id="f-width" type="number" min="64" step="8" placeholder="Width">
                <span class="size-separator">×</span>
                <input id="f-height" type="number" min="64" step="8" placeholder="Height">
              </div>
            </div>
          </details>

          <button type="submit" class="btn-primary">➕ Add to Queue</button>
          <div id="form-msg" class="form-feedback"></div>
        </form>
      </div><!-- /.card (form) -->

    </div><!-- /.left-col -->

    <!-- ── Resize handle ── -->
    <div class="col-resizer" id="col-resizer">
      <div class="col-toggle" id="col-toggle" title="Collapse / expand sidebar">◀</div>
    </div>

    <!-- ── Right column: Queue list ── -->
    <div class="right-col">
      <div class="card">
        <div class="queue-header">
          <span id="queue-status-alert" class="hidden"></span>
          <div class="stats" id="stats">
            <div class="stat pending"><span class="num" id="s-pending">–</span><span class="lbl">Pending</span></div>
            <div class="stat running"><span class="num" id="s-running">–</span><span class="lbl">Running</span></div>
            <div class="stat done"><span class="num" id="s-done">–</span><span class="lbl">Done</span></div>
            <div class="stat failed"><span class="num" id="s-failed">–</span><span class="lbl">Failed</span></div>
          </div>
        </div>
        <div id="queue-list">
          <div class="empty">Loading…</div>
        </div>
      </div>
    </div><!-- /.right-col -->

  </div><!-- /.layout -->

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="full size" onclick="event.stopPropagation()">
  </div>

</body>

</html>
